server {
    listen 80;
    server_name _;

    # ── Uploaded images — proxied through the backend ────────────────────────────
    # Proxying is simpler and more reliable than a shared volume mount:
    # the backend is the single source of truth for where files live.
    # Must come before the SPA catch-all below.
    location /uploads/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        add_header Cross-Origin-Resource-Policy "cross-origin";
        add_header Access-Control-Allow-Origin "*";

        # Don't cache 404s — a missing file may appear shortly after upload
        proxy_hide_header  Cache-Control;
        add_header         Cache-Control "public, max-age=86400";
    }

    # ── API requests → backend ──────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        client_max_body_size 200m;
        proxy_read_timeout   300s;
        proxy_send_timeout   300s;
    }

    # ── Frontend SPA ────────────────────────────────────────────────────────────
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }
}
