server {
    listen 80;
    server_name _;

    # ── Uploaded images — served directly from volume mount ─────────────────────
    # Bypasses Node entirely: nginx reads files straight from the shared volume.
    # Must come before the SPA catch-all below.
    location /uploads/ {
        alias /var/www/uploads/;
        add_header Cache-Control "public, max-age=86400, immutable";
        add_header Cross-Origin-Resource-Policy "cross-origin";
        add_header Access-Control-Allow-Origin "*";
        # Don't cache 404s — a missing file may appear shortly after upload
        error_page 404 = @uploads_miss;
    }

    location @uploads_miss {
        add_header Cache-Control "no-store";
        return 404;
    }

    # ── API requests → backend ──────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        client_max_body_size 200m;
        proxy_read_timeout   300s;
        proxy_send_timeout   300s;
    }

    # ── Frontend SPA ────────────────────────────────────────────────────────────
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }
}
