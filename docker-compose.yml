services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: koral
      POSTGRES_PASSWORD: koral
      POSTGRES_DB: koral
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U koral -d koral"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    expose:
      - "5000"
    environment:
      DATABASE_URL: postgresql://koral:koral@postgres:5432/koral
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL}
      NODE_ENV: ${NODE_ENV:-production}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      PORT: 5000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${FRONTEND_URL}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      # nginx serves /uploads/* directly from the same volume the backend writes to.
      # This bypasses Node entirely — no proxy chain for image requests.
      - uploads_data:/var/www/uploads:ro

volumes:
  postgres_data:
  uploads_data:
